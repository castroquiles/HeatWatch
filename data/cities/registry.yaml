# HeatWatch City Registry
#
# To add a new city:
# 1. Add an entry below following the schema
# 2. Add a GeoJSON boundary file at data/sample/<city_id>/neighborhoods.geojson
# 3. Open a pull request
#
# coordinate_system options:
#   wgs84  - standard GPS coordinates (most of the world)
#   gcj02  - Chinese offset system (required for mainland China cities)

cities:
  detroit:
    name: Detroit
    country: USA
    region: Michigan
    coordinate_system: wgs84
    geojson: data/sample/detroit/neighborhoods.geojson
    neighborhoods:
      - id: west_pullman
        name: West Pullman
        lst_mean: 42.1
        lst_p90: 46.0
        tree_cover_pct: 4.0
        pct_elderly: 18.0
        pct_no_ac: 22.0
        population: 24000
      - id: englewood
        name: Englewood
        lst_mean: 40.5
        lst_p90: 44.2
        tree_cover_pct: 6.0
        pct_elderly: 21.0
        pct_no_ac: 28.0
        population: 30000
      - id: midtown
